output_dir: "outputs/adapters"

num_train_epochs: 2
per_device_train_batch_size: 2
gradient_accumulation_steps: 4

logging_steps: 10
save_strategy: "no"

eval_strategy: "steps"
eval_steps: 10

learning_rate: 0.0002
lr_scheduler_type: "cosine"
warmup_ratio: 0.1

fp16: true
bf16: false

report_to: "wandb"
run_name: "zundamon-sft"